<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Водить.РФ</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Регистрация пользователя</h1>
        
        <div class="form-container">
            <div class="form-group">
                <input type="text" id="reg-login" placeholder="Логин (латиница и цифры, не менее 6 символов)">
            </div>
            <div class="form-group">
                <input type="password" id="reg-password" placeholder="Пароль (не менее 8 символов)">
            </div>
            <div class="form-group">
                <input type="text" id="reg-fullname" placeholder="ФИО (только кириллица и пробелы)">
            </div>
            <div class="form-group">
                <input type="text" id="reg-phone" placeholder="Телефон (формат: 8(XXX)XXX-XX-XX)">
            </div>
            <div class="form-group">
                <input type="email" id="reg-email" placeholder="Email">
            </div>
            <button onclick="register()">Создать пользователя</button>
            
            <div class="auth-links">
                <a href="/login.html">Уже есть аккаунт? Войти</a>
                <br>
                <a href="/index.html">На главную</a>
            </div>
            
            <div id="register-error" class="error-message" style="display:none;"></div>
            <div id="register-success" class="success-message" style="display:none;"></div>
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
